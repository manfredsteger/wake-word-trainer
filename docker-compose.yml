services:
  # Web UI — http://localhost:3000
  web:
    build:
      context: .
      target: web
    image: wake-word-trainer-web
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./piper-voices:/app/piper-voices
      - web-db:/app/web/prisma       # SQLite DB persistence

  # CLI trainer (run directly, not as a long-running service)
  trainer:
    build:
      context: .
      target: trainer
    image: wake-word-trainer
    profiles:
      - cli
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./piper-voices:/app/piper-voices

volumes:
  web-db:
